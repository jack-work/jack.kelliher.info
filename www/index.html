<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Kelliher</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #f5f2ed;
      font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
      color: #1a1714;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #card {
      position: absolute;
      background: #fff;
      border: 1px solid #d6d0c8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
    }

    .line {
      position: absolute;
      white-space: pre;
      user-select: text;
      -webkit-user-select: text;
    }

    .line a {
      color: #6b6258;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .line a:hover {
      color: #1a1714;
      border-bottom-color: #c4bdb4;
    }
  </style>
</head>
<body>
  <div id="card">
    <div id="stage"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>

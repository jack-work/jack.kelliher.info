<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Kelliher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f2ed;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #2a2520;
    }

    .card {
      background: #fff;
      border: 1px solid #d6d0c8;
      padding: 3rem 4rem;
      max-width: 480px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
      color: #2a2520;
    }

    .card .title {
      font-size: 1.15rem;
      font-style: italic;
      color: #6b6258;
      margin-bottom: 1.6rem;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: #c4bdb4;
      margin: 0 auto 1.6rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      font-size: 1.05rem;
    }

    .links a {
      color: #6b6258;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #2a2520;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>John Kelliher</h1>
    <p class="title">Senior Software Engineer</p>
    <div class="divider"></div>
    <div class="links">
      <a href="mailto:jackwkelliher@gmail.com">jackwkelliher@gmail.com</a>
      <a href="https://github.com/jack-work" target="_blank" rel="noopener">GitHub: jack-work</a>
    </div>
  </div>
</body>
</html>
